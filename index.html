<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo Download</title>
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .mobile-wrapper {
            position: relative;
            width: 100vw; 
            height: calc(100vw * 16 / 9); 
            max-width: 430px; 
            max-height: calc(430px * 16 / 9);
            background: url('images/BG.jpg') no-repeat center center;
            background-size: cover;
            /* 優化畫質 */
            image-rendering: -webkit-optimize-contrast;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            margin: auto;
            /* 允許內容溢出，防止任何子元件被切掉 */
            overflow: visible !important; 
        }

        @media (min-aspect-ratio: 9/16) {
            .mobile-wrapper {
                height: 100vh;
                width: calc(100vh * 9 / 16);
            }
        }

        #photo {
            position: absolute;
            width: 38%;     
            height: auto;   
            aspect-ratio: 3 / 4; 
            top: 30%;
            left: 15%;
            border-radius: 12px;
            /*border: 4px solid rgb(17, 17, 17);*/
            object-fit: cover;
            z-index: 10;
        }

        /* 萬用按鈕樣式優化 */
        .img-btn {
            display: block;
            border: none;
            outline: none;
            transition: transform 0.1s;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            cursor: pointer;
            z-index: 999; /* 確保在最最最上層 */
            overflow: visible !important; /* 按鈕本身也不准裁切 */
            background-clip: padding-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 下載按鈕 */
        .save-btn {
            position: absolute;
            width: 24%; /* 稍微放大一點點緩衝 */
            aspect-ratio: 1 / 1;
            background-image: url('images/download.png');
            top: 75%;
            left: 8%;
        }

        /* IG 按鈕 */
        .ig-btn { 
            position: absolute;
            width: 18%;
            aspect-ratio: 1 / 1;
            background-image: url('images/IG.png');
            top: 70%;
            left: 66%; /* 再往左移一點，遠離邊緣 */
        }

        /* Web 按鈕 */
        .web-btn { 
            position: absolute;
            width: 18%;
            aspect-ratio: 1 / 1;
            background-image: url('images/Web.png');
            top: 80%;
            left: 66%;
        }

        .img-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="mobile-wrapper">
        <img id="photo" src="" alt="Photo">

        <a id="downloadBtn" href="" download="my_photo.jpg" class="img-btn save-btn"></a>
        <a href="https://www.instagram.com/ntut.ixd/" target="_blank" class="img-btn ig-btn"></a>
        <a href="https://rrrr-website.vercel.app/" target="_blank" class="img-btn web-btn"></a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const imgUrl = urlParams.get('img');
        if (imgUrl) {
            document.getElementById('photo').src = imgUrl;
            document.getElementById('downloadBtn').href = imgUrl;
        }
    </script>
</body>
</html>
