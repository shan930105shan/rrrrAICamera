<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRRR PhotoBooth</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* 設定背景圖片 */
            background: url('images/BG.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 照片卡片容器 */
        .card {
            width: 90%;
            max-width: 350px;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            display: flex;
            aspect-ratio: 3 / 4.8;
            margin-top: 40px;
            margin-bottom: 25px;
            position: relative;
        }

        .photo-area {
            flex: 3.2;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px 15px 25px 25px;
        }

        #photo {
            width: 100%;
            border-radius: 10px;
            object-fit: contain;
        }

        .side-bar {
            flex: 0.8;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 0;
        }

        .logo-v {
            color: white;
            font-weight: 900;
            font-size: 24px;
            writing-mode: vertical-rl;
        }

        .side-text {
            color: white;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            font-size: 11px;
            letter-spacing: 1px;
            line-height: 1.6;
            opacity: 0.8;
            height: 70%;
        }

        /* 下方資訊與按鈕區 */
        .footer-container {
            width: 90%;
            max-width: 350px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 40px;
        }

        .info-area {
            flex: 1;
            color: #000; /* 如果背景太暗，請改為 #fff */
        }

        .main-title {
            font-size: 38px;
            font-weight: 800;
            line-height: 1;
            margin: 5px 0 15px 0;
        }

        .event-info {
            font-size: 10px;
            line-height: 1.5;
        }

        /* 按鈕群組 */
        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* 使用圖片作為按鈕 */
        .img-btn {
            display: block;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: transform 0.2s;
        }

        /* 下載按鈕 (Save) */
        .save-btn {
            width: 85px;
            height: 85px;
            background-image: url('images/download.png');
        }

        /* IG 按鈕 */
        .ig-btn {
            width: 60px;
            height: 60px;
            background-image: url('images/IG.png');
        }

        /* Web 按鈕 */
        .web-btn {
            width: 60px;
            height: 60px;
            background-image: url('images/Web.png');
        }

        .img-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="photo-area">
            <img id="photo" src="" alt="您的照片">
        </div>
        <div class="side-bar">
            <div class="logo-v">RRRR</div>
            <div class="side-text">
                Fearless of challenging conventions and continuing to push our ideas forward.
            </div>
        </div>
    </div>

    <div class="footer-container">
        <div class="info-area">
            <div style="font-size: 16px;">點擊下載</div>
            <h1 class="main-title">Tap to<br>save</h1>
            <div class="event-info">
                National Taipei University of Technology<br>
                Department of Interaction Design<br>
                Graduation Exhibition: RRRR
            </div>
        </div>

        <div class="button-group">
            <a id="downloadBtn" href="" download="RRRR_Photo.jpg" class="img-btn save-btn"></a>
            <a href="https://www.instagram.com/你的帳號" target="_blank" class="img-btn ig-btn"></a>
            <a href="https://你的網頁" target="_blank" class="img-btn web-btn"></a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const imgUrl = urlParams.get('img');
        if (imgUrl) {
            document.getElementById('photo').src = imgUrl;
            document.getElementById('downloadBtn').href = imgUrl;
        }
    </script>
</body>
</html>
