<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo Download</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            /* 背景設定 */
            background: url('images/BG.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* 防止手機晃動捲軸 */
        }

        /* 顯示拍好的照片 */
        .photo-container {
            width: 85%;
            max-width: 400px;
            margin-bottom: 30px;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
        }

        #photo {
            width: 100%;
            display: block;
            border-radius: 15px; /* 稍微圓角更現代 */
        }

        /* 按鈕區域 */
        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .img-btn {
            display: block;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        /* 各別按鈕尺寸設定 */
        .save-btn {
            width: 100px;
            height: 100px;
            background-image: url('images/download.png');
        }

        .ig-btn {
            width: 70px;
            height: 70px;
            background-image: url('images/IG.png');
        }

        .web-btn {
            width: 70px;
            height: 70px;
            background-image: url('images/Web.png');
        }

        /* 點擊回饋 */
        .img-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="photo-container">
        <img id="photo" src="" alt="Photo">
    </div>

    <div class="button-group">
        <a id="downloadBtn" href="" download="my_photo.jpg" class="img-btn save-btn"></a>
        
        <div style="display: flex; gap: 30px;">
            <a href="https://www.instagram.com/" class="img-btn ig-btn"></a>
            <a href="https://yourwebsite.com" class="img-btn web-btn"></a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const imgUrl = urlParams.get('img');
        if (imgUrl) {
            document.getElementById('photo').src = imgUrl;
            document.getElementById('downloadBtn').href = imgUrl;
        }
    </script>
</body>
</html>
