<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo Download</title>
    <style>
        /* 基礎設定，防止捲軸出現 */
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a; /* 外部背景設為深色，模擬手機框外 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 手機比例容器 (關鍵！) */
        .mobile-wrapper {
            position: relative;
            width: 100%;
            max-width: 430px; /* iPhone 15 Pro Max 寬度參考 */
            height: 100%;
            max-height: 932px; /* iPhone 15 Pro Max 長度參考 */
            aspect-ratio: 9 / 16; /* 標準現代手機比例 */
            background: url('images/BG.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15%; /* 根據背景圖調整照片高低 */
            box-shadow: 0 0 50px rgba(0,0,0,0.5); /* 讓容器有立體感 */
        }

        /* 為了確保在極端比例下不跑掉 */
        @media (min-aspect-ratio: 9/16) {
            .mobile-wrapper {
                height: 95vh;
                width: auto;
            }
        }

        /* 照片顯示區 */
        .photo-container {
            width: 50%;
            margin-bottom: 40px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        #photo {
            width: 100%;
            width: 120px;
            height: 160px;
            display: block;
            border-radius: 12px;
        }

        /* 按鈕區域 */
        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .img-btn {
            display: block;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border: none;
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        /* 按鈕尺寸設定 */
        .save-btn {
            position: absolute; /* 脫離自動排版 */
            width: 80px;
            height: 80px;
            background-image: url('images/download.png');
            
            /* 這裡可以精確調整坐標 */
            top: 75.5%;   /* 距離頂部 65% 的位置 */
            left: 8%;  /* 置中 */
        }

        .social-row {
            display: flex;
            gap: 30px;
        }

        .social-btn {
            width: 65px;
            height: 65px;
        }

        .ig-btn { 
            position: absolute; /* 脫離自動排版 */
            width: 65px;
            height: 65px;
            background-image: url('images/IG.png'); 
            top: 70.5%;
            left: 70%;
        }
        .web-btn { 
            position: absolute; /* 脫離自動排版 */
            width: 65px;
            height: 65px;
            background-image: url('images/Web.png'); 
            top: 80.5%;
            left: 70%; 
        }

        .img-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="mobile-wrapper">
        
        <div class="photo-container">
            <img id="photo" src="" alt="Photo">
        </div>

        <div class="button-group">
            <a id="downloadBtn" href="" download="my_photo.jpg" class="img-btn save-btn"></a>
            
            <div class="social-row">
                <a href="https://www.instagram.com/ntut.ixd/" target="_blank" class="img-btn social-btn ig-btn"></a>
                <a href="https://yourwebsite.com" target="_blank" class="img-btn social-btn web-btn"></a>
            </div>
        </div>

    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const imgUrl = urlParams.get('img');
        if (imgUrl) {
            document.getElementById('photo').src = imgUrl;
            document.getElementById('downloadBtn').href = imgUrl;
        }
    </script>
</body>
</html>
