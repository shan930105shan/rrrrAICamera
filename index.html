<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo Download</title>
    <style>
        /* 基礎設定 */
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 手機比例容器：強制鎖定 9:16 */
        .mobile-wrapper {
            position: relative;
            width: 100vw; 
            /* 關鍵：高度根據寬度計算，確保比例永遠是 9:16 */
            height: calc(100vw * 16 / 9); 
            max-width: 430px; 
            max-height: calc(430px * 16 / 9);
            background: url('images/BG.jpg') no-repeat center center;
            background-size: cover;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            /* 讓容器在長手機上上下置中 */
            margin: auto;
        }

        /* 當螢幕太長時，以高度為基準縮放 */
        @media (min-aspect-ratio: 9/16) {
            .mobile-wrapper {
                height: 100vh;
                width: calc(100vh * 9 / 16);
            }
        }

        /* 照片顯示區：位置現在是相對於 9:16 的容器 */
        #photo {
            position: absolute;
            width: 38%;     
            height: auto;   
            aspect-ratio: 3 / 4; 
            /* 使用百分比 top，因為容器高度現在已經被 aspect-ratio 固定了 */
            top: 30%;
            left: 15%;
            border-radius: 12px;
            /*border: 4px solid rgb(17, 17, 17);*/
            object-fit: cover;
        }

        /* 下載按鈕 */
        .save-btn {
            position: absolute;
            display: block;
            width: 22%;
            aspect-ratio: 1 / 1;
            background: url('images/download.png') no-repeat center center;
            background-size: contain;
            top: 75.5%;
            left: 8%;
            border: none;
            transition: transform 0.1s;
        }

        /* IG 按鈕 */
        .ig-btn { 
            position: absolute;
            display: block;
            width: 16%;
            aspect-ratio: 1 / 1;
            background: url('images/IG.png') no-repeat center center;
            background-size: contain;
            top: 70.5%;
            left: 70%;
            border: none;
            transition: transform 0.1s;
        }

        /* Web 按鈕 */
        .web-btn { 
            position: absolute;
            display: block;
            width: 16%;
            aspect-ratio: 1 / 1;
            background: url('images/Web.png') no-repeat center center;
            background-size: contain;
            top: 80.5%;
            left: 70%; 
            border: none;
            transition: transform 0.1s;
        }

        .img-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="mobile-wrapper">
        <img id="photo" src="" alt="Photo">

        <a id="downloadBtn" href="" download="my_photo.jpg" class="img-btn save-btn"></a>
        <a href="https://www.instagram.com/ntut.ixd/" target="_blank" class="img-btn ig-btn"></a>
        <a href="https://rrrr-website.vercel.app/" target="_blank" class="img-btn web-btn"></a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const imgUrl = urlParams.get('img');
        if (imgUrl) {
            document.getElementById('photo').src = imgUrl;
            document.getElementById('downloadBtn').href = imgUrl;
        }
    </script>
</body>
</html>
